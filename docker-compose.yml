services:
  service_sf:
    container_name: server_sf
    image: nginx:1.31.1-alpine3.23
    working_dir: /www
    volumes:
      - './symfony:/www/symfony'
      - './docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro'
    ports:
      - "8080:80"

  php_composer:
    container_name: php_composer
    build: docker/php
    working_dir: /www/symfony
    volumes:
      - './symfony:/www/symfony'

  postgres_sy:
    container_name: postgres_sy
    image: postgres:18.4-alpine3.24
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - 'pgsql:/var/lib/postgresql/18/docker'

volumes:
  pgsql: